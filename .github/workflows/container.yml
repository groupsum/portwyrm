name: Container

on:
  pull_request:
  push:
    branches: [master]
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  databases:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: portwyrm
          POSTGRES_USER: portwyrm
          POSTGRES_PASSWORD: portwyrm-test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U portwyrm"
          --health-interval 5s --health-timeout 3s --health-retries 20
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: portwyrm
          MYSQL_USER: portwyrm
          MYSQL_PASSWORD: portwyrm-test
          MYSQL_ROOT_PASSWORD: root-test
        ports: ["3306:3306"]
        options: >-
          --health-cmd "mysqladmin ping -h localhost -uportwyrm --password=portwyrm-test"
          --health-interval 5s --health-timeout 3s --health-retries 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --dev --locked
      - name: Exercise live PostgreSQL and MySQL repositories
        env:
          PORTWYRM_RUN_DATABASE_TESTS: "1"
        run: uv run pytest -q tests/integration/test_database_backends.py

  protocols:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --dev --locked
      - run: docker build -t portwyrm:s1-test .
      - name: Exercise real Nginx protocols
        env:
          PORTWYRM_RUN_DOCKER_TESTS: "1"
          PORTWYRM_TEST_IMAGE: portwyrm:s1-test
        run: uv run pytest -q tests/integration/test_s1_container_protocols.py

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: sigstore/cosign-installer@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/groupsum/portwyrm
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
      - uses: docker/build-push-action@v6
        id: push
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
      - name: Sign immutable GHCR digest
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "ghcr.io/groupsum/portwyrm@${DIGEST}"

  vulnerability-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t portwyrm:scan .
      - uses: aquasecurity/trivy-action@0.32.0
        with:
          image-ref: portwyrm:scan
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
