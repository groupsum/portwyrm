body: |-
  Decision
  The graph lineage HTML opener is an explicit CLI convenience side effect. The core lineage export API remains responsible only for generating the HTML artifact and returning its path.
  
  Consequences
  The CLI may call a platform-aware opener after successful export when the operator passes --open. The flag is opt-in and defaults to disabled so CI, automation, and API callers keep deterministic file-generation behavior.
  
  The CLI shall report opener failures as clear command errors. It shall also reject directory output targets before attempting to write or open a lineage artifact.
