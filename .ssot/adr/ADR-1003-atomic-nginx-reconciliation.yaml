slug: "atomic-nginx-reconciliation"
title: "Atomic Nginx reconciliation"
status: "accepted"
origin: "repo-local"
decision_date: null
tags: []
summary: "Context: Nginx configuration and process health prove that a desired generation can be served, but they do not prove that an individual upstream is reachable. Decision: reconciliation SHALL continue to render, validate, atomically activate, reload, and verify the Nginx runtime; that verification SHALL NOT be interpreted as upstream reachability. Desired state, applied-generation state, and externally observed upstream health are independent dimensions. Consequences: reconciliation may succeed while an enabled host is offline, and status projections and operator diagnostics must retain both facts. Governs: feat:runtime.nginx-reconciliation, feat:routing.proxy-hosts, feat:routing.upstream-health, feat:routing.disabled-host-isolation."
