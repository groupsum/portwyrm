summary: "Context: NPM parity allows raw Nginx directives that can escape ordinary product invariants. Decision: only administrators with the advanced_config capability may submit snippets; every snippet is preserved, audited, rendered in isolation, syntax-tested, and activated only through last-known-good reconciliation. Consequences: strict safe mode may deny dangerous directives while an explicit unrestricted compatibility mode remains available."
