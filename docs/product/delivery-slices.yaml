  "facts": [
    "The CLI, API, no-build UIX, SQLite control plane, and Nginx reconciliation path are composed and runnable.",
    "HTTP and HTTPS proxy hosts, WebSockets, asset caching, redirects, dead hosts, TCP and UDP streams, forced HTTPS, and HSTS have runtime implementations.",
    "Durable password lifecycle, permission-aware UI behavior, production certificate issuance and renewal, and complete MFA flows remain incomplete.",
    "NPM 2.15.1 parity includes MySQL/MariaDB even though it was not named in the initial persistence list.",
    "NPM parity does not include mTLS, HTTP/3, QUIC, or WebTransport."
  ],
  "assumptions": [
    "NPM 2.10.4 npmctl behavior and NPM 2.15.1 upstream behavior remain the frozen compatibility profiles for 1.0.0.",
    "A no-Node and no-npm installed runtime remains a product constraint.",
    "Each slice is a capability and evidence gate, not a time estimate."
  ],
  "inferences": [
    "Identity must close before MFA because enrollment, recovery, and challenge enforcement depend on durable credentials and sessions.",
    "Certificate lifecycle must close after core routing because issuance and renewal manipulate active host configuration.",
    "WebTransport would require a new data-plane decision rather than a WebSocket compatibility shim."
  ],
  "dependencies": [],
  "dependency_order": [
    "S1 depends on the S0 control plane and persistence baseline.",
    "S2 depends on S0 and uses S1 resources to prove authorization boundaries.",
    "S3 depends on S1 safe reconciliation and S2 certificate permissions.",
    "S4 depends on S2 durable identity and session behavior.",
    "S5 depends on S0-S4 and closes compatibility, migration, packaging, and operations evidence."
  ],
  "risks": [
    "Existing unit-level proof can overstate runtime completeness unless every slice exits through real protocol and container tests.",
    "DNS provider dependency conflicts can make catalog presence look like issuance support.",
    "Expanding the data plane for HTTP/3 or WebTransport would delay NPM replacement without improving frozen-profile parity.",
    "Changing compatibility behavior while closing the native API can break npmctl cutover."
  ],
  "metrics": [
    "Every in-scope feature is assigned to exactly one slice.",
    "Every p100 parity row has an automated test and linked evidence before S5 exits.",
    "Current npmctl workflows pass without requiring Node.js or npm on the operator machine.",
    "No out-of-bounds or won't-do feature appears in the 1.0.0 release boundary."
  ],
  "acceptance_criteria": [
    "Slices execute in dependency order and each exit gate is satisfied before the next release promotion.",
    "Out-of-bounds items require an approved boundary change, ADR, spec, feature, tests, and release-plan update before implementation.",
    "Won't-do items remain absent and cannot enter a release boundary without explicitly superseding this decision.",
    "The SSOT registry validates after feature horizons and lifecycle dispositions are recorded."
  ],
  "objective": [
    "Deliver a complete NPM-compatible replacement and the explicitly requested Portwyrm extensions without allowing protocol experiments or product imitation to destabilize 1.0.0."
  ],
