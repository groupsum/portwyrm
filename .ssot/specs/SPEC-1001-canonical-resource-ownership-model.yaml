summary: "The canonical metadata keys meta.managed_by, meta.owner, and meta.resource_id MUST survive every npmctl round trip. Adoption and pruning MUST be explicit and owner-scoped. Delete and prune operations MUST be atomic with respect to owned dependent routing rows and runtime references: foreign-owned resources MUST remain untouched, and failed cleanup MUST return non-2xx without claiming convergence."
