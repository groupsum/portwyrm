body: |-
  Context: operational health now includes recurring observations whose execution must remain safe across restarts and replicas. Decision: runtime subsystems SHALL schedule proxy-host probes through the same Tigrbl member probe operation used by direct callers, serialize scheduled work with leases, apply bounded DNS/connect/TLS/HTTP timeouts, assign freshness windows, suppress probes for disabled hosts, and emit activity only on health transitions. Consequences: scheduler and direct execution share authorization, persistence, status classification, and failure semantics without creating recurring audit noise. Governs: feat:routing.upstream-health and feat:operations.settings-audit-health.
