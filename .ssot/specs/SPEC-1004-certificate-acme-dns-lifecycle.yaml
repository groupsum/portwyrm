summary: "The product MUST support custom certificate upload and validation, ACME HTTP-01 and DNS-01 issuance, provider credential schemas, renewal scheduling, expiry and failure status, safe assignment, import, export, and recovery. The frozen NPM profile provider catalog MUST be complete. Private keys, ACME accounts, TOTP secrets, and DNS credentials MUST remain behind SecretStore and MUST never appear unredacted in logs, audit events, or ordinary exports."
