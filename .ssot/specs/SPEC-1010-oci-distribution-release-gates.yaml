body: |-
  Portwyrm SHALL publish only from a protected vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-PRERELEASE tag to ghcr.io/groupsum/portwyrm. Human-facing aliases SHALL be normalized semver MAJOR.MINOR.PATCH, MAJOR.MINOR, and MAJOR; stable releases MAY additionally receive latest, while prereleases MUST NOT receive latest or stable aliases. Branch, arbitrary ref, short SHA, and edge tags are not publication channels. The full multi-architecture digest is the deployment identity.
  
  Pull requests MUST build and scan without publishing, signing, attesting, or writing to GHCR. Before publication, database persistence, protocol, and vulnerability gates MUST pass. Published linux/amd64 and linux/arm64 images MUST carry OCI source, revision, version, and creation metadata, an SBOM, maximally detailed build provenance, and a keyless Sigstore/Cosign signature. Promotion MUST be followed by anonymous pull, signature verification, and GitHub provenance-attestation verification. Rollback MUST pin a previously verified digest and MUST NOT rewrite or retag a release. Legacy and untagged manifests require an explicit inventory and owner-scoped cleanup operation.
