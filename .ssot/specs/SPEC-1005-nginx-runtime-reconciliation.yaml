summary: "Each desired-state change MUST create an idempotent reconciliation job. The reconciler MUST serialize mutation with a lease, render a complete deterministic generation, run nginx -t, atomically activate the candidate, reload Nginx, verify runtime health, and advance applied_generation only after success. Failure MUST retain the last-known-good generation and expose actionable retry, diagnostics, and rollback. Generated configuration is derived state, not authority."
