body: |-
  Scope
  This SPEC defines the operator flow for proof-graph materialization and certification closure.
  
  Materialization flow
  A supported command shall be able to create a target feature together with scoped claims, producer tests when applicable, and evidence scaffolding without deadlocking on immediate validation. The evidence rows shall link to the claims they support and to the tests or provenance that produced them.
  
  Closure flow
  A supported command shall be able to materialize T1 source evidence, enrich higher-tier evidence metadata, create or select scoped boundary and release context, certify the release, and persist certification feedback back into linked proof evidence.
  
  Compatibility repair
  During the schema transition, supported commands shall be able to reconcile legacy claim/test/evidence mirror fields into evidence-owned proof links. Reconciliation shall be deterministic, idempotent, and shall report links that cannot be inferred without inventing proof.
  
  Idempotency and failure behavior
  Repeated runs shall converge without duplicate graph members. Failures shall leave the registry in a graph-valid or explicitly incomplete state with actionable reasons rather than silent partial closure.
