summary: "Context: private keys, ACME accounts, TOTP seeds, and DNS credentials have stricter lifecycle and backup requirements than ordinary metadata. Decision: place secret material behind SecretStore and persist only references in canonical entities. Consequences: secrets are encrypted or permission-restricted, redacted from logs and exports, and explicitly handled by backup and migration flows. Governs: feat:certificates.custom, feat:certificates.acme, feat:certificates.dns01-providers."
