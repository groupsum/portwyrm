summary: "Compatibility profiles SHALL define exact route and method capabilities, raw-array collections, token envelopes, defaults, nullability, integer and boolean coercion, unknown-field preservation, status and error shapes, gzip, CORS, no-store, security headers, and retry-safe method behavior. Native APIs SHALL remain separately versioned. Proxy-host probe operations and observed-health fields SHALL be native extensions unless an individual frozen compatibility profile explicitly includes them; compatibility payloads SHALL not drift implicitly when native health support is added."
