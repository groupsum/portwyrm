body: |-
  The product MUST implement proxy hosts, redirection hosts, dead hosts, TCP and UDP streams, and access lists. Proxy behavior MUST cover domains, upstream scheme/host/port, forced SSL, HSTS, HTTP/2, WebSocket upgrade, NPM-compatible static-asset caching, exploit blocking, custom locations, advanced configuration, enablement, certificates, and access-list linkage. Permissions and visibility MUST apply to list, get, expansion, search, mutation, and toggle operations.
