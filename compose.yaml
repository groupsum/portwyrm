services:
  portwyrm:
    build: .
    image: ghcr.io/groupsum/portwyrm:edge
    restart: unless-stopped
    environment:
      PORTWYRM_DB_BACKEND: sqlite
      PORTWYRM_SQLITE_PATH: /data/portwyrm.sqlite
      PORTWYRM_DEMO_HOST: demo.portwyrm.localhost
    ports:
      # Nginx proxy data plane.
      - "80:80"
      # Control-plane APIs and the sole built-in UI at /ui/.
      - "81:81"
      # Nginx TLS proxy data plane.
      - "443:443"
    volumes:
      - portwyrm-data:/data
      - portwyrm-certificates:/etc/letsencrypt

volumes:
  portwyrm-data:
  portwyrm-certificates:
