summary: "Memory, SQLite, MySQL/MariaDB, PostgreSQL, filesystem-only, and hybrid adapters MUST satisfy one repository conformance suite. Durable adapters MUST preserve transactions, IDs, relationships, metadata, audit ordering, outbox behavior, and secret references. Filesystem-only mode is single-writer. PostgreSQL MAY provide HA through row locks and advisory leases. Cross-backend movement MUST use a versioned checksummed export, validation, dry-run import, and reconciliation."
