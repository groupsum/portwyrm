summary: "Context: zero-touch npmctl cutover requires stable IDs, relationships, certificate material, and exact ownership metadata. Decision: migrate through versioned API and export/import contracts, shadow-render before cutover, quiesce writes for the final delta, and verify a no-drift npmctl plan. Consequences: direct coupling to the NPM database is importer-only and rollback is rehearsed. Governs: feat:migration.npm, feat:compat.npmctl."
