body: |-
  Scope
  This SPEC defines the proof-graph contract for SSOT assurance closure.
  
  Required nodes
  A valid proof graph contains at minimum a feature, one or more claims scoped to that feature, one or more evidence rows supporting those claims, and producer or provenance records for that evidence when applicable.
  
  Canonical proof path
  The canonical proof path is `test -> evidence -> claim`. Evidence rows own proof linkage through `evidence.claim_ids`. Evidence rows own test-produced provenance through `evidence.test_ids`. Claims remain directly scoped to features through `claim.feature_ids`.
  
  Compatibility fields
  Claim-to-test, claim-to-evidence, test-to-claim, and test-to-evidence fields may remain as compatibility mirrors or planning indexes during the migration window. They shall be validated against evidence-owned proof links and shall not override them.
  
  Tier semantics
  T1 requires passed supporting evidence at or above T1. If the evidence is test-produced, the linked producer tests must be passing.
  T2 additionally requires declared robustness dimensions and explicit source T1 evidence lineage.
  T3 additionally requires release context, boundary context, and a passing certification guard result that can be read from linked evidence context.
  
  Operator expectations
  Graph-valid materialization shall create a minimally valid evidence-centered linked subgraph in one supported transaction. Graph evaluation shall fail closed when required nodes, links, artifacts, producer provenance, or tier metadata are missing.
