body: |-
  Context: NPM parity includes global include points, default-site modes, resolver and IPv6 controls, trusted proxy range refresh, per-object logs, rotation, health, and upgrades. Decision: model these as explicit runtime and operations services with offline-safe defaults and deterministic configuration. Consequences: platform behavior is testable independently from host CRUD and cannot silently fall between feature buckets.
