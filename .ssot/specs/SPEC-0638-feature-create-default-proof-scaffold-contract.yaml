body: |-
  Scope
  This SPEC defines default proof-graph scaffolding behavior during feature creation.
  
  Default behavior
  `feature create` shall default to proof-graph scaffolding for new feature rows unless an explicit CLI override or effective repo-local config disables that behavior.
  
  Evidence-centered scaffold shape
  The default scaffold shall create or link the minimally valid claim, producer test, and evidence graph required for a governed feature row in the same transaction as feature creation. The evidence rows shall support the scaffolded claims and shall record test provenance when scaffold tests are created.
  
  Tier separation
  When scaffolded proof includes more than one claim tier, scaffold support shall remain tier-separated. The command shall not collapse distinct scaffolded claim tiers onto one ambiguous proof triangle. Shared evidence may aggregate across tiers only when it explicitly supports each claim and satisfies the tier and source-lineage requirements for each target claim.
  
  Overrides and auditability
  The precedence order remains explicit CLI flag, repo-local config, then built-in default. The command shall expose an auditable result that makes clear when proof-graph scaffolding occurred, what ids were created or linked, and what files were materialized.
