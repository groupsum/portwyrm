summary: "The product MUST expose NPM-compatible settings and audit endpoints plus native liveness, readiness, database, reconciliation, Nginx, certificate scheduler, proxy-host observation, and degraded-state health. Authenticated system status MUST report live Nginx active, reading, writing, and waiting connection counters from a loopback-only status source and the full content-addressed active configuration generation; unavailable telemetry MUST not be represented as fabricated zero values. Proxy-host observations MUST report freshness, stage, latency, response status when available, and redacted diagnostics according to spc:1018. Audit MUST cover authentication, token, permission, secret, certificate, resource mutation, activation, and rollback events while redacting passwords, bearer tokens, provider credentials, TOTP seeds, and private keys. Recurring health probes MUST not create mutation-audit noise; activity MUST be emitted only on meaningful health transitions. Reports MUST distinguish desired, validated, applied, and externally observed state."
