summary: "The implementation MUST expose frozen NPM 2.10.4/npmctl and NPM 2.15.1 compatibility profiles covering routes, methods, authentication, request and response shapes, defaults, nullability, permissions, expansions, errors, enable and disable semantics, deletion, pruning, and side effects. Existing npmctl doctor, schema check, plan, apply, adopt, drift, and audit-log workflows MUST run without npmctl changes. Compatibility profile changes require golden-wire, current live npmctl, and cleanup evidence. A delete is not converged until the resource and its owned dependent state are absent and Nginx has reconciled."
