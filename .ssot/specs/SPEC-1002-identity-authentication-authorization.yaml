summary: "The control plane MUST support NPM-compatible users, admins, disabled state, password lifecycle, section permissions hidden/view/manage, visibility user/all, RS256 JWT issuance and refresh, TOTP challenge, and eight one-use backup codes. Native personal and service tokens MUST be opaque, scoped, expiring, revocable, shown once, hashed at rest, and audited. UI sessions MUST use secure HttpOnly cookies and CSRF protection."
