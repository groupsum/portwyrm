body: |-
  Context: the published image must coordinate the API, worker, scheduler, and Nginx without requiring external npm tooling. Decision: use one signal-aware supervisor contract, explicit readiness and liveness, ports 80/81/443, durable data and certificate mounts, configurable UID/GID, and a documented rootless high-port mode. Consequences: shutdown, restart, upgrade, permissions, and health are conformance-tested across amd64 and arm64.
