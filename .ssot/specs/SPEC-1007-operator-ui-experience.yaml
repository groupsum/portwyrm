summary: "The control-plane UI MUST provide dashboard, host, certificate, access-list, user, token, activity, settings, and system-health flows. It MUST represent loading, empty, error, read-only, hidden, saving, pending, success, validation failure, activation failure, degraded runtime, certificate risk, and destructive dependency states. Proxy-host rows and details MUST not infer online from enabled. They MUST expose administrative state, deployment state, and observed reachability, support online, offline, stale, unknown, probing, and disabled filtering, show last observation and a concise diagnostic, and preserve the precedence rules in spc:1018. Responsive behavior, keyboard operation, focus management, semantic forms and tables, reduced motion, 200 percent zoom, and WCAG 2.2 AA are release requirements."
