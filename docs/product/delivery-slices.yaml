  "out_of_bounds": [
    {
      "feature_id": "feat:security.mtls",
      "reason": "Client-certificate authentication and upstream client certificates are valuable security extensions but are not NPM parity or required for the frozen 1.0.0 boundary.",
      "reentry_gate": "Approve a security boundary, trust-store and revocation model, dedicated spec, threat model, and protocol tests."
    },
    {
      "feature_id": "feat:routing.http3-quic",
      "reason": "HTTP/3 and QUIC require a data-plane and container networking expansion beyond NPM parity.",
      "reentry_gate": "Approve a data-plane ADR and prove runtime, observability, fallback, and packaging support."
    },
    {
      "feature_id": "feat:experience.advanced-user-preferences",
      "reason": "Arbitrary durable per-user preferences exceed the baseline profile, password, theme, accessibility, and locale needs in S2.",
      "reentry_gate": "Demonstrate a concrete operator job and define a versioned preference schema and migration policy."
    }
  ],
  "wont_do": [
    {
      "feature_id": "feat:routing.webtransport",
      "reason": "WebTransport is not WebSocket parity and is not supported by the selected Nginx OSS data-plane contract; a compatibility shim would be misleading.",
      "reconsideration_gate": "A superseding data-plane ADR with native WebTransport support, security analysis, and an independent product outcome."
    },
    {
      "item": "Require Node.js or npm to install, build, or operate Portwyrm",
      "reason": "This contradicts the product's portability objective and no-build UIX contract."
    },
    {
      "item": "Copy NPM branding or trade dress",
      "reason": "Compatibility targets observable behavior, not product identity."
    }
