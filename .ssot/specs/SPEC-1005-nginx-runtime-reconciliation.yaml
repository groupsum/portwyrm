body: |-
  Nginx reconciliation MUST be triggered after npmctl create, update, enable, disable, delete, and prune operations. Deletion MUST remove or retire generated host configuration and dependent runtime records according to the retention policy, validate the resulting aggregate, and preserve the last-known-good generation when a new reconciliation fails.
