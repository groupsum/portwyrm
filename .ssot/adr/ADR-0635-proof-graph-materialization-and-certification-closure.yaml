body: |-
  Summary
  Proof graphs shall be materializable and closable through supported operator workflows, with evidence rows owning proof links.
  
  Decision
  The SSOT CLI and MCP surfaces shall support atomic or fail-closed materialization of a minimally valid evidence-centered proof graph and a repeatable closure workflow for higher-tier evidence, boundary context, release certification, and certification feedback propagation.
  
  A minimally valid create-time scaffold shall create scoped claims, producer tests when applicable, and evidence rows that link to the claims they support and the tests or other provenance that produced them. Scaffolded claim tiers shall remain tier-separated. When a scaffold creates T0 and T1 claims, it shall create evidence-centered support for each tier rather than collapsing proof authority onto one ambiguous placeholder triangle.
  
  Implications
  A user shall not need hidden row-order knowledge to author or close a valid proof graph. T2 and T3 closure metadata, including robustness dimensions, source evidence links, and release context, shall be first-class operator inputs on evidence rows. Release certification outcomes that satisfy claim-tier gates shall be reattachable to linked proof evidence without direct registry edits.
