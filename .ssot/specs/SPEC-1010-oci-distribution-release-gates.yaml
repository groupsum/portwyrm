body: |-
  Portwyrm SHALL publish only from a protected vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-PRERELEASE tag to ghcr.io/groupsum/portwyrm. Human-facing aliases SHALL be normalized SemVer MAJOR.MINOR.PATCH, MAJOR.MINOR, and MAJOR; stable releases MAY additionally receive latest, while prereleases MUST NOT receive latest or stable aliases. Branch, master, edge, arbitrary ref, short SHA, and CI tags are not publication channels. The complete OCI digest reference is the immutable deployment and rollback identity.
  
  Pull requests and branch pushes MUST build and scan without publishing, signing, attesting, or writing to GHCR. Before promotion, database persistence, protocol, and vulnerability gates MUST pass. Published linux/amd64 and linux/arm64 images MUST carry OCI source, revision, version, and creation metadata, an SBOM, and maximally detailed GitHub Actions build provenance. The promoted digest MUST receive a keyless Sigstore/Cosign signature and registry attestation. Verification MUST pull anonymously and validate the signature and provenance against the digest and release workflow identity.
  
  Tag aliases MUST point to the same verified digest and MUST NOT be used as deployment identity. Stable aliases are MAJOR.MINOR.PATCH, MAJOR.MINOR, MAJOR, and latest. A prerelease receives only its exact normalized prerelease tag. Rollback MUST pin a previously verified digest and MUST NOT rewrite a release tag. Signature and attestation objects SHALL be retained with each protected release digest. Untagged manifests and legacy aliases require an explicit owner-scoped inventory, retention window, deletion record, and post-delete verification. The historical 0.1.0a0/edge group remains a temporary legacy exception until the first compliant SemVer release is published and verified.
