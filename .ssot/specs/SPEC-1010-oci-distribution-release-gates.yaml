summary: "Releases MUST publish immutable linux/amd64 and linux/arm64 OCI images with pinned Compose examples for supported deployment modes. Published artifacts MUST include checksums, SBOM, provenance, vulnerability results, and signatures. The 1.0.0 release MUST certify every p100 feature against its linked tests and evidence, pass npmctl end-to-end verification, and complete backup, migration, failed-reload, certificate-renewal, and last-known-good rollback drills."
