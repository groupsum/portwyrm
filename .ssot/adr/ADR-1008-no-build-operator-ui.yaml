body: |-
  Context: operators require an NPM-class UI without installing Node.js or npm. Decision: package standards-based HTML, CSS, and browser JavaScript as versioned Python package assets served by the control plane and embedded in the OCI image. Consequences: development and deployment remain uv/Python based; the UI stays API-driven, CSP-compatible, accessible, and cache-versioned.
