name: Container

on:
  pull_request:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  databases:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: portwyrm
          POSTGRES_USER: portwyrm
          POSTGRES_PASSWORD: portwyrm-test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U portwyrm"
          --health-interval 5s --health-timeout 3s --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --dev --locked
      - name: Exercise live PostgreSQL restart persistence
        env:
          PORTWYRM_RUN_DATABASE_TESTS: "1"
        run: uv run pytest -q tests/integration/test_postgresql_restart.py

  protocols:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --dev --locked
      - run: docker build -t portwyrm:s1-test .
      - name: Exercise real Nginx protocols
        env:
          PORTWYRM_RUN_DOCKER_TESTS: "1"
          PORTWYRM_TEST_IMAGE: portwyrm:s1-test
        run: uv run pytest -q tests/integration/test_s1_container_protocols.py

  vulnerability-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t portwyrm:scan .
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: portwyrm:scan
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          limit-severities-for-sarif: true
      - name: Retain the vulnerability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif
      - name: Publish the vulnerability report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  publish:
    if: github.event_name != 'pull_request'
    needs: [databases, protocols, vulnerability-scan]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    uses: cobycloud/actions/.github/workflows/reusable-ghcr-publish.yml@master
    with:
      image: ghcr.io/groupsum/portwyrm
      platforms: linux/amd64,linux/arm64
      package-api-path: /orgs/groupsum/packages/container/portwyrm
      certificate-identity-regexp: ^https://github.com/groupsum/portwyrm/.github/workflows/container.yml@refs/tags/v.*$
      build-args: |
        OCI_REVISION=${{ github.sha }}
        OCI_VERSION=${{ github.ref_name }}
        OCI_SOURCE=https://github.com/${{ github.repository }}
        OCI_CREATED=${{ github.event.head_commit.timestamp || '' }}
