summary: "Migration MUST inventory live resources, preserve compatibility IDs and relationships, retain npmctl ownership metadata, transfer or deliberately reissue certificate material, validate the import, shadow-render every host, and report dry-run conflicts. Cutover MUST quiesce writes, apply a final delta, preserve ports and existing secret names, verify no unintended npmctl drift, exercise HTTPS and WebSockets, and retain a documented rollback path. Backup and restore MUST be tested for every durable mode."
