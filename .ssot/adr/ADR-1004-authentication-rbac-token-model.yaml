summary: "Context: NPM compatibility requires JWT, user visibility, section permissions, and TOTP while operators also require revocable automation credentials. Decision: preserve compatible JWT/RBAC/2FA behavior and add separately scoped opaque personal and service tokens stored only as hashes. Consequences: native tokens never alter compatibility JWT semantics and every privilege transition is audited. Governs: feat:identity.users-rbac, feat:identity.auth-2fa, feat:identity.access-tokens."
