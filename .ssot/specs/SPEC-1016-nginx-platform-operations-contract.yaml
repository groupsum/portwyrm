title: "Nginx platform and operations contract"
status: "accepted"
origin: "repo-local"
decision_date: null
tags: []
summary: "The runtime SHALL implement global include points, five default-site modes, IPv6 and resolver controls, offline-safe trusted proxy range refresh, stable per-object access and error logs, rotation, retention and reopen, semantic health states, startup migrations, version reporting, and forward-only upgrade diagnostics. An administratively disabled proxy hostname SHALL render an explicit non-proxying server block returning 503 and SHALL never fall through to the default site or retain proxy_pass behavior. Nginx platform and reconciliation health SHALL remain distinct from upstream reachability."
