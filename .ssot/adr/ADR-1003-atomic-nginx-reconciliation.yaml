summary: "Context: partial configuration writes or failed reloads can take every routed service offline. Decision: render complete immutable generations, run nginx -t, atomically select the candidate, reload, verify health, and retain the last-known-good generation. Consequences: desired and applied generations are tracked separately and failures expose retry and rollback. Governs: feat:runtime.nginx-reconciliation, feat:routing.proxy-hosts, feat:routing.streams."
