services:
  portwyrm:
    image: ghcr.io/groupsum/portwyrm:edge
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORTWYRM_DB_BACKEND: mysql
      PORTWYRM_DATABASE_HOST: mysql
      PORTWYRM_DATABASE_PORT: 3306
      PORTWYRM_DATABASE_NAME: portwyrm
      PORTWYRM_DATABASE_USER: portwyrm
      PORTWYRM_DATABASE_PASSWORD: ${PORTWYRM_MYSQL_PASSWORD:?set PORTWYRM_MYSQL_PASSWORD}
    ports:
      # Nginx proxy data plane.
      - "80:80"
      # Control-plane APIs and the sole built-in UI at /ui/.
      - "81:81"
      # Nginx TLS proxy data plane.
      - "443:443"
    volumes:
      - portwyrm-data:/data
      - portwyrm-certificates:/etc/letsencrypt
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: portwyrm
      MYSQL_USER: portwyrm
      MYSQL_PASSWORD: ${PORTWYRM_MYSQL_PASSWORD:?set PORTWYRM_MYSQL_PASSWORD}
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uportwyrm", "--password=$$MYSQL_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  portwyrm-data:
  portwyrm-certificates:
  mysql-data:
