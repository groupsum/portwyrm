body: |-
  The production Portwyrm operator UI SHALL be built from the maintained React component source and committed as compiled Python-package and OCI assets. Node.js tooling MAY be used only to regenerate checked-in frontend assets; Python package installation, container startup, and self-hosted operation SHALL NOT require Node.js or npm. The UI SHALL use authenticated Portwyrm APIs only and SHALL NOT ship mock stores, seeded demo identities, simulated reconciliation state, AI Studio metadata, or plaintext credentials. It SHALL provide setup, authentication and MFA challenge completion, overview, unified hosts and certificates, access lists, users and permissions, audit, settings, account security, and persistent system health. Relationship controls SHALL present human-readable resource names rather than requiring operators to copy or paste resource IDs.
