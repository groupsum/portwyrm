summary: "Context: Certbot DNS plugins may have conflicting dependencies and secrets must not cross provider boundaries. Decision: execute ACME providers through isolated adapters with declared credential schemas, redaction, bounded processes, and provider health. Consequences: catalog availability is distinct from certified issuance support and provider failure cannot take down proxy service."
